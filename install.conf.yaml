- defaults:
    link:
      relink: true
      create: true

- clean: ['~']

- link:
    ~/.zshrc: zshrc
    ~/.gitconfig: gitconfig
    ~/.config/alacritty/alacritty.yml: alacritty.yml
    ~/.config/nvim/init.lua: init.lua
    ~/.config/nvim/lua/aman: lua/aman
    ~/.config/nvim/lua/config.lua: config.lua
    ~/.tmux.conf: tmux.conf
    ~/.config/ghostty/config: ghostty/config.ghostty
    ~/.tmuxinator/avarni.yml: tmuxinator/avarni.yml
    ~/bin/uatdb-tunnel: bin/uatdb-tunnel

- shell:
  - [git submodule update --init --recursive, Installing submodules]
