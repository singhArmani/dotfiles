name: Avarni
root: ~/workspace

windows:
  - 🎃avarni-spa:
      root: ~/workspace/avarni-dashboard
      panes:
        - nvim

  - 🌐core-api:
      root: ~/workspace/core-api
      panes:
        - nvim

  - 🚀servers:
      layout: main-vertical
      panes:
        - cd ~/workspace/avarni-dashboard && pnpm start
        - cd ~/workspace/core-api && dotnet run --project Avarni.Api
        - cd ~/workspace/core-api && dotnet run --project Avarni.Worker/Avarni.Worker.csproj -- --seed false

  - 🧪workbench:
      root: ~/workspace
      panes:
        -
